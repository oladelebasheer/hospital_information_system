{% extends 'base_auth.html' %}

{% block content %}
<div class="card shadow border-0" style="width: 100%; max-width: 420px; border-radius: 16px;">

    <!-- Header -->
    <div class="card-header text-white text-center py-3" style="background-color: #440E03;">
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Login
        </h2>
    </div>

    <div class="card-body p-4">

        {% if form.errors %}
            <div class="alert alert-danger d-flex align-items-center">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                Invalid username or password.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label for="id_username" class="form-label fw-semibold">
                    <i class="bi bi-person-fill me-1"></i>
                    Username
                </label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="bi bi-person"></i>
                    </span>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        class="form-control"
                        placeholder="Enter username"
                        required
                    >
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="id_password" class="form-label fw-semibold">
                    <i class="bi bi-lock-fill me-1"></i>
                    Password
                </label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        class="form-control"
                        placeholder="Enter password"
                        required
                    >
                </div>
            </div>

            <!-- Button -->
            <button type="submit" class="btn w-100 text-white" style="background-color:#440E03;">
                <i class="bi bi-box-arrow-in-right me-1"></i>
                Login
            </button>

        </form>
    </div>
</div>
{% endblock %}
