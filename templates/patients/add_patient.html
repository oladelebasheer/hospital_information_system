{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            
            <!-- Header -->
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">
                    <i class="bi bi-person-plus-fill me-2"></i>
                    Add Patient
                </h4>
            </div>

            <!-- Body -->
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <!-- Full Name -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-person-fill me-1"></i> Full Name
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            {{ form.full_name }}
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-people-fill me-1"></i> Gender
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-gender-ambiguous"></i>
                            </span>
                            {{ form.gender }}
                        </div>
                    </div>

                    <!-- Age -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-calendar-fill me-1"></i> Age
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-123"></i>
                            </span>
                            {{ form.age }}
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-telephone-fill me-1"></i> Phone
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-telephone"></i>
                            </span>
                            {{ form.phone }}
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-geo-alt-fill me-1"></i> Address
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-geo"></i>
                            </span>
                            {{ form.address }}
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-between mt-4">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save me-1"></i> Save Patient
                        </button>

                        <a href="{% url 'patient_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-1"></i> Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
